services:
  - type: web
    name: cv-convos-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_STORE_TYPE
        value: sqlite
